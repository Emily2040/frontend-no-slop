<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Frontend No-Slop V2 hero infographic</title>
  <desc id="desc">Infographic with three columns: evidence inputs, orchestration checks, and structured outputs for frontend-no-slop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="100%" stop-color="#101b2d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0%" stop-color="#6ea6ff"/>
      <stop offset="100%" stop-color="#67e2cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <circle cx="1180" cy="80" r="260" fill="#1e2f4e" opacity="0.28"/>
  <circle cx="120" cy="760" r="280" fill="#103948" opacity="0.2"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="76" y="96" fill="#ecf1f8" font-size="48" font-weight="700">Frontend No-Slop</text>
    <text x="76" y="136" fill="#9fb0c8" font-size="24">Evidence-in workflow for concrete frontend decisions</text>

    <rect x="76" y="186" width="384" height="528" rx="22" fill="#111b2d" stroke="#2c3d5f" filter="url(#shadow)"/>
    <text x="106" y="232" fill="#77a6ff" font-size="24" font-weight="600">1) Evidence intake</text>
    <rect x="106" y="262" width="324" height="76" rx="14" fill="#1a2840" stroke="#34486d"/>
    <text x="126" y="302" fill="#ecf1f8" font-size="22">Code + DOM snapshots</text>
    <rect x="106" y="356" width="324" height="76" rx="14" fill="#1a2840" stroke="#34486d"/>
    <text x="126" y="396" fill="#ecf1f8" font-size="22">User task + constraints</text>
    <rect x="106" y="450" width="324" height="76" rx="14" fill="#1a2840" stroke="#34486d"/>
    <text x="126" y="490" fill="#ecf1f8" font-size="22">Screenshots + states</text>
    <rect x="106" y="544" width="324" height="140" rx="14" fill="#142033" stroke="#34486d"/>
    <text x="126" y="582" fill="#9fb0c8" font-size="20">Evidence quality checks</text>
    <text x="126" y="614" fill="#ecf1f8" font-size="18">• specific references</text>
    <text x="126" y="642" fill="#ecf1f8" font-size="18">• explicit assumptions</text>
    <text x="126" y="670" fill="#ecf1f8" font-size="18">• no invented claims</text>

    <rect x="508" y="186" width="384" height="528" rx="22" fill="#121f31" stroke="#2c3d5f" filter="url(#shadow)"/>
    <text x="538" y="232" fill="#7ce6c8" font-size="24" font-weight="600">2) Orchestration</text>
    <text x="538" y="274" fill="#9fb0c8" font-size="19">Mode selection + slop scrubber + page lens</text>

    <rect x="538" y="302" width="324" height="34" rx="9" fill="#1a2840"/>
    <rect x="538" y="302" width="286" height="34" rx="9" fill="url(#blue)"/>
    <text x="548" y="325" fill="#0a0f18" font-size="15" font-weight="600">Grounding and evidence alignment</text>

    <rect x="538" y="356" width="324" height="34" rx="9" fill="#1a2840"/>
    <rect x="538" y="356" width="240" height="34" rx="9" fill="#7ce6c8"/>
    <text x="548" y="379" fill="#0a0f18" font-size="15" font-weight="600">State coverage discipline</text>

    <rect x="538" y="410" width="324" height="34" rx="9" fill="#1a2840"/>
    <rect x="538" y="410" width="218" height="34" rx="9" fill="#ffc867"/>
    <text x="548" y="433" fill="#0a0f18" font-size="15" font-weight="600">A11y/performance checks</text>

    <rect x="538" y="468" width="324" height="216" rx="14" fill="#142033" stroke="#34486d"/>
    <text x="560" y="510" fill="#ecf1f8" font-size="20" font-weight="600">Core modules</text>
    <text x="560" y="542" fill="#9fb0c8" font-size="18">01 intake + grounding</text>
    <text x="560" y="570" fill="#9fb0c8" font-size="18">02 slop scrubber</text>
    <text x="560" y="598" fill="#9fb0c8" font-size="18">03 layout + visual logic</text>
    <text x="560" y="626" fill="#9fb0c8" font-size="18">04 state discipline</text>
    <text x="560" y="654" fill="#9fb0c8" font-size="18">05 a11y + performance + copy</text>

    <rect x="940" y="186" width="384" height="528" rx="22" fill="#121d2d" stroke="#2c3d5f" filter="url(#shadow)"/>
    <text x="970" y="232" fill="#ffc867" font-size="24" font-weight="600">3) Output contracts</text>
    <text x="970" y="272" fill="#ecf1f8" font-size="22" font-family="ui-monospace, Menlo, monospace">{</text>
    <text x="1002" y="302" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"surface": "dashboard",</text>
    <text x="1002" y="332" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"primary_task": "...",</text>
    <text x="1002" y="362" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"top_fixes": [ ... ],</text>
    <text x="1002" y="392" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"state_gaps": [ ... ],</text>
    <text x="1002" y="422" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"a11y_flags": [ ... ],</text>
    <text x="1002" y="452" fill="#ecf1f8" font-size="18" font-family="ui-monospace, Menlo, monospace">"perf_flags": [ ... ]</text>
    <text x="970" y="482" fill="#ecf1f8" font-size="22" font-family="ui-monospace, Menlo, monospace">}</text>

    <rect x="970" y="520" width="324" height="164" rx="14" fill="#142033" stroke="#34486d"/>
    <text x="990" y="560" fill="#9fb0c8" font-size="18">Output checks</text>
    <text x="990" y="590" fill="#ecf1f8" font-size="18">• actionable, not ornamental</text>
    <text x="990" y="618" fill="#ecf1f8" font-size="18">• evidence-linked claims</text>
    <text x="990" y="646" fill="#ecf1f8" font-size="18">• includes state + responsive behavior</text>

    <path d="M460 450H508" stroke="#4f678f" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M892 450H940" stroke="#4f678f" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#4f678f"/>
    </marker>
  </defs>
</svg>

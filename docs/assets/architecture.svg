<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Frontend No-Slop architecture infographic</title>
  <desc id="desc">Layered architecture view of wrappers, canonical source, orchestrator, core modules, registries, schemas, examples, and validation automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="100%" stop-color="#10192b"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="920" fill="url(#bg)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="70" y="80" fill="#ecf1f8" font-size="44" font-weight="700">Frontend No-Slop architecture (V2)</text>
    <text x="70" y="118" fill="#9fb0c8" font-size="22">Progressive disclosure flow from adapters to validated output contracts</text>

    <rect x="70" y="160" width="1260" height="120" rx="18" fill="#122035" stroke="#2f4264"/>
    <text x="96" y="206" fill="#77a6ff" font-size="24" font-weight="600">Adapter layer</text>
    <text x="96" y="244" fill="#ecf1f8" font-size="20">SKILL.md • AGENTS.md • CLAUDE.md • GEMINI.md • .cursorrules • .clinerules</text>

    <rect x="70" y="314" width="1260" height="120" rx="18" fill="#14253c" stroke="#2f4264"/>
    <text x="96" y="360" fill="#7ce6c8" font-size="24" font-weight="600">Canonical router + orchestrator</text>
    <text x="96" y="398" fill="#ecf1f8" font-size="20">.agents/skills/frontend-no-slop/SKILL.md → references/00-orchestrator.md</text>

    <rect x="70" y="468" width="620" height="290" rx="18" fill="#162843" stroke="#2f4264"/>
    <text x="96" y="510" fill="#ffc867" font-size="24" font-weight="600">Core execution modules</text>
    <text x="96" y="548" fill="#ecf1f8" font-size="19">01 intake and grounding</text>
    <text x="96" y="578" fill="#ecf1f8" font-size="19">02 slop scrubber</text>
    <text x="96" y="608" fill="#ecf1f8" font-size="19">03 layout and visual logic</text>
    <text x="96" y="638" fill="#ecf1f8" font-size="19">04 component state discipline</text>
    <text x="96" y="668" fill="#ecf1f8" font-size="19">05 a11y, performance, content</text>
    <text x="96" y="698" fill="#ecf1f8" font-size="19">06 page type lenses</text>
    <text x="96" y="728" fill="#ecf1f8" font-size="19">07 output contract shaping</text>

    <rect x="710" y="468" width="620" height="132" rx="18" fill="#162843" stroke="#2f4264"/>
    <text x="736" y="510" fill="#77a6ff" font-size="24" font-weight="600">Registries</text>
    <text x="736" y="548" fill="#ecf1f8" font-size="19">forbidden-slop.json • page-type-lenses.json • frontend-evidence-prompts.json</text>

    <rect x="710" y="626" width="620" height="132" rx="18" fill="#162843" stroke="#2f4264"/>
    <text x="736" y="668" fill="#7ce6c8" font-size="24" font-weight="600">Contracts + examples</text>
    <text x="736" y="706" fill="#ecf1f8" font-size="19">authoring-base.json • runtime-compact.json • example outputs (+ invalid fixtures)</text>

    <rect x="70" y="790" width="1260" height="90" rx="16" fill="#1a2d4a" stroke="#2f4264"/>
    <text x="96" y="842" fill="#ecf1f8" font-size="24">Validation layer: scripts/validate_repo.py • scripts/check_docs.py • scripts/quick_audit.sh • GitHub Actions</text>

    <path d="M700 280V314" stroke="#47638d" stroke-width="4"/>
    <path d="M380 434V468" stroke="#47638d" stroke-width="4"/>
    <path d="M1020 434V468" stroke="#47638d" stroke-width="4"/>
    <path d="M1020 600V626" stroke="#47638d" stroke-width="4"/>
    <path d="M380 758V790" stroke="#47638d" stroke-width="4"/>
    <path d="M1020 758V790" stroke="#47638d" stroke-width="4"/>
  </g>
